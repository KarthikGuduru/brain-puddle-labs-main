  <meta name="description" content="Check your AI Resilience Score on BrainPuddle and see how automation-ready your role is." />

  <meta property="og:type" content="website" />

<body style="font-family: Inter, Arial, sans-serif; padding: 2rem; background: #f9f9f9; color: #111;">
  <h1 style="font-size: 1.5rem; margin-bottom: 0.75rem;">Opening shared AI Score...</h1>
  <p style="line-height: 1.5;">If you are not redirected automatically, <a id="fallback-link" href="/ai-score/shared">open the shared result</a>.</p>

  <noscript>
    <meta http-equiv="refresh" content="1; url=/ai-score/shared" />
  </noscript>

  <script>
    (function () {
      const query = window.location.search || '';
      const target = '/ai-score/shared' + query;
      const fallback = document.getElementById('fallback-link');
      if (fallback) fallback.href = target;
      window.setTimeout(function () {
        window.location.replace(target);
      }, 800);
    })();
  </script>
</body>
